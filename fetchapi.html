<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>Fetch API CRUD - Tornyok</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./layout.js"></script>
</head>

<body>
    

    <main>
        <h2>Széltornyok kezelése (Szerveres adatbázis Fetch API-val)</h2>

        <div class="form-group">
            <input type="number" id="tDarab" placeholder="Darab (pl. 3)">
            <input type="number" id="tTelj" placeholder="Teljesítmény (kW)">
            <input type="number" id="tEv" placeholder="Év (pl. 2010)">

            <select id="tHelyszin" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1;">
                <option value="">Válassz helyszínt...</option>
            </select>

            <button class="add" onclick="hozzaad()">Új Torony</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Darab</th>
                    <th>Teljesítmény</th>
                    <th>Kezdő év</th>
                    <th>Település</th>
                    <th>Műveletek</th>
                </tr>
            </thead>
            <tbody id="lista">
            </tbody>
        </table>
    </main>

    <script>
        
        const API_URL = 'http://liunjtm3bhzp.nhely.hu/backend/api.php';
        let helyszinekListaja = [];

        async function init() {
            const valaszHely = await fetch(API_URL + '?action=helyszin');
            helyszinekListaja = await valaszHely.json();

            const select = document.getElementById('tHelyszin');
            helyszinekListaja.forEach(h => {
                select.innerHTML += `<option value="${h.id}">${h.nev}</option>`;
            });

            
            betoltes();
        }

        async function betoltes() {
            const valasz = await fetch(API_URL);
            const adatok = await valasz.json();

            const tbody = document.getElementById('lista');
            tbody.innerHTML = adatok.map(t => `
                <tr>
                    <td>${t.id}</td>
                    <td>${t.darab} db</td>
                    <td>${t.teljesitmeny} kW</td>
                    <td>${t.kezdev}</td>
                    <td><strong>${t.telepules_nev}</strong></td>
                    <td>
                        <button class="edit" onclick="szerkeszt(${t.id}, ${t.darab}, ${t.teljesitmeny}, ${t.kezdev}, ${t.helyszinid})">Módosítás</button>
                        <button class="delete" onclick="torol(${t.id})">Törlés</button>
                    </td>
                </tr>
            `).join('');
        }

        async function hozzaad() {
            const darab = document.getElementById('tDarab').value;
            const telj = document.getElementById('tTelj').value;
            const ev = document.getElementById('tEv').value;
            const hely = document.getElementById('tHelyszin').value;

            if (!darab || !telj || !ev || !hely) return alert("Minden mezőt ki kell tölteni!");

            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({darab: darab, teljesitmeny: telj, kezdev: ev, helyszinid: hely})
            });

            document.getElementById('tDarab').value = "";
            document.getElementById('tTelj').value = "";
            document.getElementById('tEv').value = "";
            document.getElementById('tHelyszin').value = "";
            betoltes();
        }

        async function szerkeszt(id, regiDarab, regiTelj, regiEv, regiHely) {
            const ujDarab = prompt("Új darabszám:", regiDarab);
            const ujTelj = prompt("Új teljesítmény (kW):", regiTelj);
            const ujEv = prompt("Új kezdő év:", regiEv);

            let helySzoveg = helyszinekListaja.map(h => `${h.id} = ${h.nev}`).join('\\n');
            const ujHely = prompt(`Új Helyszín ID-ja:\\n\\n${helySzoveg}\\n\\nJelenlegi ID:`, regiHely);

            if (ujDarab && ujTelj && ujEv && ujHely) {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id: id, darab: ujDarab, teljesitmeny: ujTelj, kezdev: ujEv, helyszinid: ujHely})
                });
                betoltes();
            }
        }

        async function torol(id) {
            if (confirm("Biztosan törlöd ezt a széltornyot?")) {
                await fetch(API_URL, {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id: id})
                });
                betoltes();
            }
        }

        window.onload = init;
    </script>
</body>

</html>
